<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mot de passe oublié</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="../login/auth.css" rel="stylesheet" />
    <link href="./forgot-password.css" rel="stylesheet" />
</head>
<body>
<main class="auth-card">
    <h1>Mot de passe oublié</h1>
    <p>Entrez votre nom d'utilisateur, le système affichera votre question secrète.</p>

    <form id="forgot-form">
        <label for="username">Nom d'utilisateur</label>
        <input id="username" name="username" required />

        <button type="button" id="load-question">Afficher ma question</button>

        <div id="question-block" class="hidden">
            <label for="question">Question secrète</label>
            <input id="question" name="question" type="text" readonly />

            <label for="answer">Réponse secrète</label>
            <input id="answer" name="answer" type="text" required />

            <label for="newPassword">Nouveau mot de passe</label>
            <input id="newPassword" name="newPassword" type="password" required />

            <button type="submit">Réinitialiser le mot de passe</button>
        </div>

        <p class="status" data-status></p>
    </form>

    <p class="helper"><a href="../login/login.html">Retour à la connexion</a></p>
</main>

<script src="./forgot-password.js"></script>
</body>
</html>
