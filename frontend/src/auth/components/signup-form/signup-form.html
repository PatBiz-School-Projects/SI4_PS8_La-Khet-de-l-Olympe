<form data-button="Créer le compte">
    <label for="username">Nom d'utilisateur</label>
    <input id="username" name="username" placeholder="nom_prenom" required />

    <label for="password">Mot de passe</label>
    <input id="password" name="password" type="password" placeholder="********" required />

    <label for="question">Question secrète</label>
    <input id="question" name="question" type="text" placeholder="Ex: nom de mon premier animal ?" required />

    <label for="answer">Réponse secrète</label>
    <input id="answer" name="answer" type="text" placeholder="Votre réponse" required />

    <button type="submit">Créer le compte</button>
    <p class="status" data-status></p>
</form>
