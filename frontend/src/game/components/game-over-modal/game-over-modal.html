<app-modal id="game-over-modal">
    <div slot="modal-header">
        <h2>Fin de la partie !</h2>
    </div>

    <div slot="modal-content">
        <p id="detail"></p>
        <div id="buttons">
            <button id="challenge-btn" hidden>Défier cet adversaire</button>
            <button id="home-btn">Retour à l'accueil</button>
        </div>
    </div>

    <div slot="modal-footer">
        <p id="status"></p>
    </div>
</app-modal>
