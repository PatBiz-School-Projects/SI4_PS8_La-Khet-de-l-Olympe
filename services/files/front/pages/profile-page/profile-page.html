<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mon Profil - La Khet De L'Olympe</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="./profile-page.css" rel="stylesheet" />
    <script type="module" src="./profile-page.js" defer></script>
</head>
<body>
<main class="profile-page">
    <a class="back-link" href="../home-page/home-page.html">← Retour à l'accueil</a>

    <section class="profile-card">
        <img id="profile-picture" class="profile-picture" alt="Photo de profil" src="/assets/pharaoh-blue.png" />
        <div class="profile-info">
            <h1 id="profile-username">Utilisateur</h1>
            <p id="profile-elo">ELO: --</p>
        </div>
    </section>
    <section class="stats-card" aria-labelledby="profile-stats-title">
        <h2 id="profile-stats-title">Statistiques</h2>
        <div class="stats-grid">
            <article class="stat-item">
                <p class="stat-label">Winrate</p>
                <p id="profile-winRate" class="stat-value">0%</p>
            </article>
            <article class="stat-item">
                <p class="stat-label">Total games</p>
                <p id="profile-total-games" class="stat-value">0</p>
            </article>
            <article class="stat-item">
                <p class="stat-label">Total wins</p>
                <p id="profile-total-wins" class="stat-value">0</p>
            </article>
            <article class="stat-item">
                <p class="stat-label">Total losses</p>
                <p id="profile-total-losses" class="stat-value">0</p>
            </article>
            <article class="stat-item">
                <p class="stat-label">Win streak</p>
                <p id="profile-win-streak" class="stat-value">0</p>
            </article>
        </div>
    </section>
    <section class="friends-card">
        <h2>Liste d'amis</h2>
        <p id="friends-empty" class="empty-friends">Aucun ami à afficher pour le moment.</p>
        <ul id="friends-list" class="friend-list" aria-live="polite"></ul>
    </section>

    <section class="friends-card">
        <h2>Demandes reçues</h2>
        <p id="requests-empty" class="empty-friends">Aucune demande en attente.</p>
        <ul id="requests-list" class="friend-list" aria-live="polite"></ul>
    </section>


    <p id="profile-status" class="profile-status" aria-live="polite"></p>
</main>
</body>
</html>
