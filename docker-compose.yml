services:
  gateway:
    build:
      context:
        ./services/gateway
    ports:
      - "8000:8000"
    environment:
      FILES_SERVICE_URL: http://files-service:8001
      GAMES_SERVICE_URL: http://games-service:8002
      AUTH_SERVICE_URL: http://auth-service:8003
      USER_SERVICE_URL: http://user-service:8004
    depends_on:
      - games-service
      - auth-service
      - files-service
      - user-service
    networks:
      - internal
      - public

  files-service:
    build:
      context: ./services/files
    networks:
      - internal
    environment:
        PORT: 8001

  user-service:
      build:
          context: ./services
          dockerfile: ./userService/Dockerfile
      networks:
          - internal
      environment:
          DB_URL: mongodb://mongo:27017
          DB_NAME: users
          PORT: 8004
      depends_on:
          mongo:
            condition: service_healthy

  games-service:
    build:
      context: ./services
      dockerfile: ./gameService/Dockerfile
    networks:
      - internal
    environment:
        PORT: 8002

  auth-service:
    build:
      context: ./services
      dockerfile: ./auth/Dockerfile
    networks:
      - internal
    environment:
      USER_SERVICE_URL: http://user-service:8004
      DB_URL: mongodb://mongo:27017
      DB_NAME : auth
      JWT_SECRET : kSMIWOZ2BOEAqbnwGLXafltUn1yO2iE5wkeN6h81m4Q=
      TOKEN_EXPIRY : '12h'
      PORT: 8003
    depends_on:
      mongo:
          condition: service_healthy

  mongo:
      image: mongo:7.0
      volumes:
          - ./data/db:/data/db
      #command: ["mongod", "--quiet", "--logpath", "/dev/null"]
      networks:
          - internal
      healthcheck:
          test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
          interval: 10s
          timeout: 5s
          retries: 5

  mongo-express:
    image: mongo-express:1.0.2-20-alpine3.19
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - internal
      - public




networks:
  public:
  internal:
    internal: true



