<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inscription</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Fauna+One&display=swap" rel="stylesheet">
    <link href="/auth/auth.css" rel="stylesheet" />
</head>
<body>
<main class="auth-card">
    <h1>Inscription</h1>
    <p>Créez un compte pour accéder aux fonctionnalités.</p>

    <form data-endpoint="/api/auth/signup" data-button="Créer le compte">
        <label for="username">Username</label>
        <input id="username" name="username" type="username" placeholder="abcdLEBG" required />

        <label for="password">Mot de passe</label>
        <input id="password" name="password" type="password" placeholder="********" required />

        <button type="submit">Créer le compte</button>
        <p class="status" data-status></p>
    </form>

    <p class="helper">
        Déjà un compte ? <a href="/auth/index.html">Se connecter</a>
    </p>
</main>

<script src="/auth/auth.js"></script>
</body>
</html>
