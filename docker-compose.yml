#
# YAML Anchors
#


x-common: &common
  env_file: secrets.env

x-ports:
  - &files-port "8001"
  - &games-port "8002"
  - &auth-port  "8003"
  - &users-port "8004"
  - &challenges-port "8005"
  - &chats-port "8006"

x-urls:
  - &files-url http://file-service:8001
  - &games-url http://game-service:8002
  - &auth-url  http://auth-service:8003
  - &users-url http://user-service:8004
  - &challenges-url http://challenge-service:8005
  - &chats-url http://chat-service:8006
  - &mongo-url mongodb://mongo:27017
  - &redis-url redis://redis:6379

x-dbs:
  - &games-db games
  - &users-db users
  - &auth-db  auth
  - &chats-db chats


#
# Services
#


services:
  gateway:
    <<: *common
    build:
      context: ./backend/services/gateway
      network: host
    depends_on:
      - game-service
      - auth-service
      - file-service
      - user-service
      - challenge-service
    environment:
      IS_PROD:               ${IS_PROD}
      SSL_CERTIFICATE:       ${SSL_CERTIFICATE}
      SSL_PRIVATE_KEY:       ${SSL_PRIVATE_KEY}
      FILE_SERVICE_URL:      *files-url
      GAME_SERVICE_URL:      *games-url
      AUTH_SERVICE_URL:      *auth-url
      USER_SERVICE_URL:      *users-url
      CHALLENGE_SERVICE_URL: *challenges-url
      CHAT_SERVICE_URL:      *chats-url
    volumes:
      - ./backend/helpers:/app/helpers:ro
    ports:
      - "8000:8000"
      - "8443:8443"
    networks:
      - internal
      - public

  file-service:
    <<: *common
    build:
      context: ./backend/services/files
      network: host
    environment:
      IS_PROD: ${IS_PROD}
      PORT: *files-port
    volumes:
      - ./backend/helpers:/app/helpers:ro
      - ./frontend/src:/app/front:ro
      - ./frontend/assets:/app/front/assets:ro
    networks:
      - internal

  user-service:
    <<: *common
    build:
      context: ./backend/services/userService
      network: host
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT:             *users-port
      DB_NAME:          *users-db
      DB_URL:           *mongo-url
      REDIS_URL:        *redis-url
      AUTH_SERVICE_URL: *auth-url
    volumes:
      - ./backend/helpers:/app/helpers:ro
    networks:
      - internal

  game-service:
    <<: *common
    build:
      context: ./backend/services/gameService
      network: host
    depends_on:
      mongo:
        condition: service_healthy
      user-service:
        condition: service_started
      chat-service:
        condition: service_started
    environment:
      IS_PROD:          ${IS_PROD}
      PORT:             *games-port
      DB_NAME:          *games-db
      DB_URL:           *mongo-url
      USER_SERVICE_URL: *users-url
      CHAT_SERVICE_URL: *chats-url
      AUTH_SERVICE_URL: *auth-url
    volumes:
      - ./backend/helpers:/app/helpers:ro
    networks:
      - internal

  chat-service:
    <<: *common
    build:
      context: ./backend/services/chats
      network: host
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_started
    environment:
      IS_PROD:          ${IS_PROD}
      PORT:             *chats-port
      DB_NAME:          *chats-db
      DB_URL:           *mongo-url
      REDIS_URL:        *redis-url
      USER_SERVICE_URL: *users-url
      AUTH_SERVICE_URL: *auth-url
    volumes:
      - ./backend/helpers:/app/helpers:ro
    networks:
      - internal

  challenge-service:
    <<: *common
    build:
      context: ./backend/services/challengeService
      network: host
    depends_on:
      user-service:
        condition: service_started
      game-service:
        condition: service_started
    environment:
      IS_PROD:          ${IS_PROD}
      PORT:             *challenges-port
      USER_SERVICE_URL: *users-url
      GAME_SERVICE_URL: *games-url
      AUTH_SERVICE_URL: *auth-url
    volumes:
      - ./backend/helpers:/app/helpers:ro
    networks:
      - internal

  auth-service:
    <<: *common
    build:
      context: ./backend/services/auth
      network: host
    depends_on:
      mongo:
        condition: service_healthy
      user-service:
        condition: service_started
    environment:
      IS_PROD:              ${IS_PROD}
      PORT:                 *auth-port
      JWT_SECRET:           ${JWT_SECRET}
      ACCESS_TOKEN_EXPIRY:  ${ACCESS_TOKEN_EXPIRY}
      REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY}
      DB_NAME:              *auth-db
      DB_URL:               *mongo-url
      USER_SERVICE_URL:     *users-url
      AUTH_SERVICE_URL:     *auth-url
    volumes:
      - ./backend/helpers:/app/helpers:ro
    networks:
      - internal

  mongo:
    <<: *common
    image: mongo:7.0
    volumes:
      - ./backend/database:/data/db
    command: ["mongod", "--quiet", "--logpath", "/dev/null"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7.4-alpine
    command: [
      "redis-server",
      "--loglevel", "warning",
      "--save", "",          # disables RDB snapshots
      "--appendonly", "no"   # disables AOF persistence
    ]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  mongo-express:
    <<: *common
    image: mongo-express:1.0.2-20-alpine3.19
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_URL:        *mongo-url
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD}
    ports:
      - "8081:8081"
    networks:
      - internal
      - public


#
# Networks
#


networks:
  public:
  internal:
    internal: true
