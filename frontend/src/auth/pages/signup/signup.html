<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inscription</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />

    <script src="/media.js"></script>

    <link href="../login/auth.css" rel="stylesheet" />
    <script type="module" src="../login/auth.js" defer></script>
</head>

<body>
<main class="auth-card">
    <h1>Inscription</h1>
    <p>Créez un compte et définissez votre question secrète une seule fois.</p>

    <form data-endpoint="/api/auth/signup" data-button="Créer le compte">
        <label for="username">Nom d'utilisateur</label>
        <input id="username" name="username" placeholder="nom_prenom" required />

        <label for="password">Mot de passe</label>
        <input id="password" name="password" type="password" placeholder="********" required />

        <label for="question">Question secrète</label>
        <input id="question" name="question" type="text" placeholder="Ex: nom de mon premier animal ?" required />

        <label for="answer">Réponse secrète</label>
        <input id="answer" name="answer" type="text" placeholder="Votre réponse" required />

        <button type="submit">Créer le compte</button>
        <p class="status" data-status></p>
    </form>

    <p class="helper">
        Déjà un compte ? <a href="../login/login.html">Se connecter</a>
    </p>
</main>
</body>
</html>
