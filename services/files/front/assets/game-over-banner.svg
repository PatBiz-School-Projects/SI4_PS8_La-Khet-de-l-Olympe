<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260" role="img" aria-labelledby="title desc">
    <title id="title">Game Over</title>
    <desc id="desc">Bannière game over pour la fin de partie</desc>
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#130b05"/>
            <stop offset="100%" stop-color="#2a1608"/>
        </linearGradient>
        <linearGradient id="text" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#f4d77a"/>
            <stop offset="50%" stop-color="#e0b650"/>
            <stop offset="100%" stop-color="#f8e7ae"/>
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <rect x="4" y="4" width="892" height="252" rx="18" fill="url(#bg)" stroke="#d7ae51" stroke-width="8"/>
    <text x="450" y="135" text-anchor="middle" font-size="92" font-family="Cinzel, serif" fill="url(#text)" filter="url(#glow)" letter-spacing="5">GAME OVER</text>
    <text x="450" y="190" text-anchor="middle" font-size="24" font-family="Fauna One, serif" fill="#e7d7aa">Le pharaon est tombé</text>
</svg>