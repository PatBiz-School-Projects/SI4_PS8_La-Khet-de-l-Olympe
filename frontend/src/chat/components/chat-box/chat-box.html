<div id="chat-box" data-state="folded">

    <!-- Chat Header (always visible) -->
    <div id="chat-header" tabindex="0">
        <div id="header-content">
            <span id="chat-icon">
                <svg
                    width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.8"
                    stroke-linecap="round" stroke-linejoin="round"
                >
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
            </span>
            <span id="chat-title">Discussion</span>
        </div>

        <div id="fold-dir-indicator">
            <!-- The arrow rotate 180° when unfolded -->
            <svg
                width="100%" height="100%" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
            >
                <polyline points="18 15 12 9 6 15"/>
            </svg>
        </div>
    </div>

    <!-- Chat Body (visible only when unfolded) -->
    <div id="chat-body">
        <div id="messages-wrapper">
            <div id="load-sentinel"></div> <!-- Useful for infinite loading (detected by `IntersectionObserver`) -->

            <div id="loading-older" hidden>
                <span class="loading-dot"></span>
                <span class="loading-dot"></span>
                <span class="loading-dot"></span>
            </div>

            <div id="messages-container">
                <p id="empty-state">Aucun message pour le moment...</p>
            </div>
        </div>

        <div id="input-wrapper">
            <div id="input-divider">
                <span id="input-divider-gem">⬥</span>
            </div>
            <div id="input-row">
                <input
                    id="message-input"
                    type="text"
                    placeholder="Votre message..."
                    maxlength="500"
                    autocomplete="off"
                />
                <button id="send-btn" disabled>
                    <svg
                        width="13" height="13" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round"
                    >
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </div>

    </div>
</div>
