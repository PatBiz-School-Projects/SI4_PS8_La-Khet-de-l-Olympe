<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Khet De L'Olympe — Salle d'attente</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />

    <link href="./waiting-room-page.css" rel="stylesheet">
    <script type="module" src="./waiting-room-page.js" defer></script>
</head>

<body>
    <div class="stars"></div>
    <div class="pillar pillar-left"></div>
    <div class="pillar pillar-right"></div>

    <main class="scene">
        <div class="waiting-block">
            <p class="waiting-eyebrow">Salle d'attente</p>

            <div class="laser-icon"></div>

            <div class="waiting-text">
                <span class="label" id="waiting-label">Invocation de la partie en cours</span>
                <span class="dots">
                    <span id="d1"></span>
                    <span id="d2"></span>
                    <span id="d3"></span>
                </span>
            </div>

            <div class="divider"></div>

            <p class="waiting-sub">Les dieux préparent le plateau</p>
        </div>

        <button class="btn-cancel" onclick="window.location.href='/home/pages/home-page/home-page.html'">
            Annuler
        </button>
    </main>

    <p class="ornament">⬥ &nbsp; Khet — Le Jeu des Lasers &nbsp; ⬥</p>
</body>
</html>
