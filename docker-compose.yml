x-urls:
  - &files-url http://file-service:8001
  - &games-url http://game-service:8002
  - &auth-url  http://auth-service:8003
  - &users-url http://user-service:8004
  - &challenges-url http://challenge-service:8005
  - &chats-url http://chat-service:8006
  - &mongo-url mongodb://mongo:27017

x-dbs:
  - &games-db games
  - &users-db users
  - &auth-db  auth


#
# Services
#


services:
  gateway:
    <<: *common
    build:
      context: ./services/gateway
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    depends_on:
      - game-service
      - auth-service
      - file-service
      - user-service
      - challenge-service
    environment:
      IS_PROD: ${IS_PROD}
      SSL_CERTIFICATE: ${SSL_CERTIFICATE}
      SSL_PRIVATE_KEY: ${SSL_PRIVATE_KEY}
      FILE_SERVICE_URL: *files-url
      GAME_SERVICE_URL: *games-url
      AUTH_SERVICE_URL: *auth-url
      USER_SERVICE_URL: *users-url
      CHALLENGE_SERVICE_URL: *challenges-url
      CHAT_SERVICE_URL: *chats-url
    ports:
      - "8000:8000"
      - "8443:8443"
    networks:
      - internal
      - public

  file-service:
    <<: *common
    build:
      context: ./services/files
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    environment:
      PORT: *files-port
    volumes:
      - ./frontend/src:/app/front
      - ./frontend/assets:/app/front/assets
    networks:
      - internal

  user-service:
    <<: *common
    build:
      context: ./services
      dockerfile: ./userService/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    networks:
      - internal
    environment:
      PORT:    *users-port
      DB_URL:  *mongo-url
      DB_NAME: *users-db
    depends_on:
      mongo:
        condition: service_healthy

  game-service:
    <<: *common
    build:
      context: ./services
      dockerfile: ./gameService/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    networks:
      - internal
    environment:
      PORT:             *games-port
      DB_URL:           *mongo-url
      DB_NAME:          *games-db
      USER_SERVICE_URL: *users-url
      CHAT_SERVICE_URL: *chats-url
    depends_on:
      mongo:
        condition: service_healthy

  chat-service:
    <<: *common
    build:
      context: ./services
      dockerfile: ./chats/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    networks:
      - internal
    environment:
      PORT: *chats-port
      USER_SERVICE_URL: *users-url

  challenge-service:
    <<: *common
    build:
      context: ./services
      dockerfile: ./challengeService/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    networks:
      - internal
    environment:
      PORT: *challenges-port
      USER_SERVICE_URL: *users-url
      GAME_SERVICE_URL: *games-url

  auth-service:
    <<: *common
    build:
      context: ./services
      dockerfile: ./auth/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    environment:
      PORT:                 *auth-port
      JWT_SECRET:           ${JWT_SECRET}
      ACCESS_TOKEN_EXPIRY:  ${ACCESS_TOKEN_EXPIRY}
      REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY}
      DB_URL:               *mongo-url
      DB_NAME:              *auth-db
      USER_SERVICE_URL:     *users-url
    networks:
      - internal

  mongo:
    <<: *common
    image: mongo:7.0
    volumes:
      - ./data/db:/data/db
    command: ["mongod", "--quiet", "--logpath", "/dev/null"]
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
